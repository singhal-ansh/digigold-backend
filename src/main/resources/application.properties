# ?? Server ???????????????????????????????????????????????????
spring.application.name=fingold-backend
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ?? PostgreSQL ????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ?? JWT ???????????????????????????????????????????????????????
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ?? Razorpay ?????????????????????????????????????????????????
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR
razorpay.company-name=FinGold

# ?? Gold Price Settings ???????????????????????????????????????
app.gold.price-validity-seconds=300
app.gold.gst-percentage=3.0
app.gold.making-charge-percentage=0.0
app.gold.min-buy-amount=10.00
app.gold.max-buy-amount=200000.00
app.gold.min-sell-grams=0.001

# ?? CORS ?????????????????????????????????????????????????????
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.max-age=3600

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.fingold=INFO
